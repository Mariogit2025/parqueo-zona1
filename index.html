```html
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Parqueo Público</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff;
color:#222;
}

.hero{

height:100vh;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.55)
),
url('entrada.jpg');

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

padding:20px;
text-align:center;

}

.hero-content{

max-width:700px;
color:white;

}

.hero h1{

font-size:clamp(48px,9vw,90px);
font-weight:700;
line-height:.95;

margin-bottom:25px;

letter-spacing:2px;

}

.hero p{

font-size:clamp(18px,4vw,28px);

font-weight:300;

line-height:1.7;

margin-bottom:35px;

}

.buttons{

display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;

}

.btn{

padding:16px 28px;

border-radius:14px;

text-decoration:none;

font-weight:600;

transition:.25s;

}

.btn-primary{

background:#d4af37;
color:black;

}

.btn-secondary{

background:white;
color:black;

}

.btn:hover{

transform:translateY(-2px);

}

.location{

padding:70px 20px;

max-width:1100px;

margin:auto;

}

.location h2{

font-size:32px;
margin-bottom:20px;

text-align:center;

}

.address{

text-align:center;

font-size:20px;

line-height:1.8;

margin-bottom:35px;

}

.map{

width:100%;
height:450px;

border:none;

border-radius:20px;

box-shadow:0 8px 25px rgba(0,0,0,.12);

}

.footer{

padding:35px;

text-align:center;

background:#111;

color:white;

font-size:15px;

margin-top:60px;

}

@media(max-width:768px){

.hero{

height:100svh;

}

.buttons{

flex-direction:column;

}

.btn{

width:100%;

}

.map{

height:320px;

}

.location h2{

font-size:26px;

}

.address{

font-size:18px;

}

}

</style>

</head>

<body>

<section class="hero">

<div class="hero-content">

<h1>

PARQUEO
PÚBLICO

</h1>

<p>

Llegue fácil.<br>
Estacione cómodo.<br>
Continúe su camino.

</p>

<div class="buttons">

<a
class="btn btn-primary"
href="https://www.google.com/maps/dir/?api=1&destination=8a+Calle+0-38+Zona+1+Guatemala+Guatemala"
target="_blank">

Iniciar navegación

</a>

<a
class="btn btn-secondary"
href="https://www.google.com/maps/search/?api=1&query=8a+Calle+0-38+Zona+1+Guatemala+Guatemala"
target="_blank">

Abrir Google Maps

</a>

</div>

</div>

</section>

<section class="location">

<h2>Ubicación</h2>

<div class="address">

8a Calle 0-38<br>
Zona 1<br>
Guatemala, Guatemala

</div>

<iframe
class="map"
src="https://maps.google.com/maps?q=8a%20Calle%200-38%20Zona%201%20Guatemala%20Guatemala&t=&z=17&ie=UTF8&iwloc=&output=embed">
</iframe>

</section>

<footer class="footer">

Parqueo Público<br>
Zona 1 · Guatemala

</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parqueo Público Zona 1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff;
color:#222;
}

.hero{

height:100svh;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.55)
),
url('entrada.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

padding:20px;

}

.hero-content{

max-width:700px;
color:white;

}

.hero h1{

font-size:clamp(48px,10vw,90px);

font-weight:700;

line-height:.95;

letter-spacing:2px;

margin-bottom:20px;

}

.hero p{

font-size:clamp(18px,4vw,28px);

font-weight:300;

line-height:1.7;

margin-bottom:35px;

}

.buttons{

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

}

.btn{

padding:16px 28px;

border-radius:14px;

text-decoration:none;

font-weight:600;

transition:.25s;

}

.btn-primary{

background:#d4af37;

color:black;

}

.btn-secondary{

background:white;

color:black;

}

.btn:hover{

transform:translateY(-2px);

}

.location{

padding:70px 20px;

max-width:900px;

margin:auto;

text-align:center;

}

.location h2{

font-size:32px;

margin-bottom:25px;

}

.address{

font-size:20px;

line-height:1.8;

margin-bottom:40px;

}

.qr-section{

padding:20px;

}

.qr-title{

font-size:22px;

font-weight:600;

margin-bottom:20px;

}

.qr-image{

width:220px;

max-width:80%;

border-radius:16px;

box-shadow:0 8px 20px rgba(0,0,0,.12);

}

.qr-text{

margin-top:15px;

font-size:15px;

color:#666;

}

.footer{

background:#111;

color:white;

padding:30px;

text-align:center;

margin-top:50px;

font-size:15px;

}

@media(max-width:768px){

.hero{

height:100svh;

}

.hero h1{

font-size:52px;

}

.hero p{

font-size:20px;

}

.buttons{

flex-direction:column;

}

.btn{

width:100%;

}

.location h2{

font-size:28px;

}

.address{

font-size:18px;

}

.qr-image{

width:180px;

}

}

</style>

</head>

<body>

<section class="hero">

<div class="hero-content">

<h1>

PARQUEO
PÚBLICO

</h1>

<p>

Llegue fácil.<br>
Estacione cómodo.<br>
Continúe su camino.

</p>

<div class="buttons">

<a
class="btn btn-primary"
href="https://maps.app.goo.gl/ifFcPrT9euy86ufy9"
target="_blank">

Iniciar navegación

</a>

<a
class="btn btn-secondary"
href="https://maps.app.goo.gl/ifFcPrT9euy86ufy9"
target="_blank">

Abrir Google Maps

</a>

</div>

</div>

</section>

<section class="location">

<h2>Ubicación</h2>

<div class="address">

8a Calle 0-38<br>
Zona 1<br>
01001 Guatemala, Guatemala

</div>

<div class="qr-section">

<div class="qr-title">

Compartir ubicación

</div>

<img
src="qr.png"
alt="Código QR"
class="qr-image">

<div class="qr-text">

Escanee este código para abrir esta página
desde otro dispositivo.

</div>

</div>

</section>

<footer class="footer">

Parqueo Público · Zona 1 · Guatemala

</footer>

</body>

</html>
```
